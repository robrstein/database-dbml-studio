      await showAlert('Cambiando a DBML', 'La importación de SQL genera un modelo DBML/ER. Se va a cambiar a esa pestaña.');
      switchModelType('dbml');
    }

    const currentHasContent = getDbml().trim().length > 0;
    if (currentHasContent) {
      const ok = await showModal({
        title: 'Importar SQL',
        message: 'Esto va a REEMPLAZAR el contenido actual de DBML con lo importado desde "' + file.name + '". ¿Continuar?',
        confirmText: 'Importar y reemplazar'
      });
      if (!ok) return;
    }

    const dbmlText = buildDBMLFromSQLGeneric(parsedSQL);
    state.suppressHistoryPush = true;
    setDbml(dbmlText);
    state.suppressHistoryPush = false;
    persistModels();
    renderGraph(getDbml());
    pushHistory(getDbml());

    await showAlert(
      'Importado',
      'Se importaron ' + parsedSQL.entities.length + ' tabla(s) y ' + parsedSQL.connections.length + ' relación(es) desde "' + file.name + '".'
    );
  });

  elGenerateFrom.addEventListener('change', async function () {
    const fromType = elGenerateFrom.value;
    elGenerateFrom.value = '';
    if (!fromType) return;

    const targetType = state.activeModelType;
    const sourceText = fromType === state.activeModelType ? getDbml() : state.models[fromType];
    if (!sourceText || !sourceText.trim()) return;

    const currentHasContent = getDbml().trim().length > 0;
    if (currentHasContent) {
      const ok = await showModal({
        title: 'Generar ' + (MODEL_LABELS[targetType] || targetType),
        message: 'Esto va a REEMPLAZAR el contenido actual de ' + (MODEL_LABELS[targetType] || targetType) +
          ' con lo generado a partir de ' + (MODEL_LABELS[fromType] || fromType) + '. ¿Continuar?',
        confirmText: 'Generar y reemplazar'
      });
      if (!ok) return;
    }

    const generic = extractGeneric(fromType, sourceText);
    const generated = buildFromGeneric(targetType, generic);

    state.suppressHistoryPush = true;
    setDbml(generated);
    state.suppressHistoryPush = false;
    persistModels();
    renderGraph(getDbml());
    pushHistory(getDbml());

    await showAlert(
      'Listo',
      'Se generaron ' + generic.entities.length + ' entidad(es) y ' + generic.connections.length + ' relación(es) desde ' +
      (MODEL_LABELS[fromType] || fromType) + '. Revisa el resultado — lo que no se pudo inferir queda marcado con TODO.'
    );
  });

  /* =========================================================================
     13. RESIZER (PANEL ARRASTRABLE)
     ========================================================================= */
  (function initResizer() {
    let dragging = false;
    elResizer.addEventListener('mousedown', function () {
      dragging = true;
      elResizer.classList.add('dragging');
      document.body.classList.add('resizing');
    });
    document.addEventListener('mousemove', function (evt) {
      if (!dragging) return;
      const appRect = elApp.getBoundingClientRect();
      let pct = ((evt.clientX - appRect.left) / appRect.width) * 100;
      pct = Math.max(20, Math.min(70, pct));
      elEditorPanel.style.width = pct + '%';
      localStorage.setItem(LS_KEYS.splitWidth, pct);
      cm.refresh();
    });
    document.addEventListener('mouseup', function () {
      if (dragging) {
        dragging = false;
        elResizer.classList.remove('dragging');
        document.body.classList.remove('resizing');
        cm.refresh();
      }
    });
    const savedPct = localStorage.getItem(LS_KEYS.splitWidth);
    if (savedPct) elEditorPanel.style.width = savedPct + '%';
  })();

  /* =========================================================================
     13b. PESTAÑAS MÓVILES — en pantallas <768px solo se muestra un panel a
     la vez (Editor o Diagrama); en escritorio esto no tiene efecto visual
     porque #mobile-tabbar permanece oculto vía CSS.
     ========================================================================= */
  function setMobileView(view) {
    state.mobileView = view;
    const isEditor = view === 'editor';
    elEditorPanel.classList.toggle('mobile-hide', !isEditor);
    elCanvasPanel.classList.toggle('mobile-hide', isEditor);
    elMtabEditor.classList.toggle('active', isEditor);
    elMtabDiagram.classList.toggle('active', !isEditor);
    if (isEditor) {
      setTimeout(function () { cm.refresh(); }, 60);
    } else {
      setTimeout(function () {
        paper.setDimensions(elPaperContainer.clientWidth, elPaperContainer.clientHeight);
        updateMinimap();
      }, 60);
    }
  }
  elMtabEditor.addEventListener('click', function () { setMobileView('editor'); });
  elMtabDiagram.addEventListener('click', function () { setMobileView('diagram'); });

  /* =========================================================================
     14. INICIALIZACIÓN
     ========================================================================= */
  (function init() {
    try {
      // Restaura los 3 modelos guardados (o valores por defecto para cada uno)
      let savedModels = null;
      try { savedModels = JSON.parse(localStorage.getItem(LS_KEYS.models) || 'null'); } catch (e) { savedModels = null; }
      const legacyDbml = localStorage.getItem(LS_KEYS.dbml); // compatibilidad con la versión previa a multi-modelo
      state.models = savedModels || {
        dbml: legacyDbml !== null ? legacyDbml : DEFAULT_DBML,
        uml: DEFAULT_UML,
        dfd: DEFAULT_DFD
      };
      state.activeModelType = localStorage.getItem(LS_KEYS.activeModelType) || 'dbml';
      modelTypeButtons.forEach(b => b.classList.toggle('active', b.dataset.model === state.activeModelType));
      cm.setOption('mode', state.activeModelType);

      try {
        const savedNotes = JSON.parse(localStorage.getItem(LS_KEYS.notes) || 'null');
        state.notes = Object.assign({ dbml: [], uml: [], dfd: [] }, savedNotes || {});
      } catch (e) { state.notes = { dbml: [], uml: [], dfd: [] }; }

      try {
        state.positions = JSON.parse(localStorage.getItem(LS_KEYS.positions + '.' + state.activeModelType) || '{}');
      } catch (e) { state.positions = {}; }

      const initialText = state.models[state.activeModelType] || '';
      setDbml(initialText);

      layoutButtons.forEach(b => b.classList.toggle('active', b.dataset.layout === state.layoutMode));

      renderGraph(initialText, { keepPositions: Object.keys(state.positions).length > 0 });

      state.history = [initialText];
      state.historyIndex = 0;
      updateUndoRedoButtons();

      setStatus('saved');
      setZoom(1);
      updateViewSlotsUI();
      refreshProjectSelect();
      refreshGenerateFromOptions();
      setMobileView(state.mobileView);
      cm.refresh();

      window.addEventListener('resize', function () {
        cm.refresh();
        paper.setDimensions(elPaperContainer.clientWidth, elPaperContainer.clientHeight);
        updateMinimap();
      });
    } catch (e) {
      console.error('[DBML Studio] Fallo al inicializar:', e);
      setStatus('error');
    }
  })();

})();
</script>
