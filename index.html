  /* =========================================================================
     4. PARSER DBML (subconjunto pragmático)
     ========================================================================= */
  function cardinalityPair(symbol) {
    // Cardinalidad tal como aparece escrita: {izquierda, derecha}
    switch (symbol) {
      case '>': return { left: 'N', right: '1' };   // muchos-a-uno
      case '<': return { left: '1', right: 'N' };   // uno-a-muchos
      case '<>': return { left: 'N', right: 'N' };  // muchos-a-muchos
      default: return { left: '1', right: '1' };    // '-' uno-a-uno
    }
  }

  function parseDBML(text) {
    const tables = [];
    const refs = [];
    const groups = [];
    if (!text || !text.trim()) return { tables, refs, groups };

    // Elimina bloques "indexes { ... }" para no confundir al parser de campos
    const cleaned = text.replace(/indexes\s*\{[^}]*\}/gi, '');

    // --- Tablas ---
    const tableRe = /Table\s+([a-zA-Z0-9_."]+)\s*(?:as\s+[a-zA-Z0-9_]+)?\s*(?:\[([^\]]*)\])?\s*\{([\s\S]*?)\}/gi;
    let m;
    while ((m = tableRe.exec(cleaned)) !== null) {
      const rawName = m[1].replace(/"/g, '');
      const settings = m[2] || '';
      const body = m[3] || '';

      let color = null;
      const colorMatch = settings.match(/headercolor:\s*["']?(#[0-9a-fA-F]{3,8}|[a-zA-Z]+)["']?/i);
      if (colorMatch) color = colorMatch[1];

      const fields = [];
      const lines = body.split('\n');
      lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;
        if (/^Note\b/i.test(trimmed)) return;
        if (/^\/\//.test(trimmed)) return;

        const fieldMatch = trimmed.match(/^([a-zA-Z0-9_."]+)\s+([a-zA-Z0-9_()., ]+?)(?:\s*\[([^\]]*)\])?\s*$/);
        if (!fieldMatch) return;
        const fName = fieldMatch[1].replace(/"/g, '');
        const fType = (fieldMatch[2] || '').trim();
        const fSettings = fieldMatch[3] || '';
        const isPk = /\bpk\b|\bprimary key\b/i.test(fSettings);

        fields.push({ name: fName, type: fType, pk: isPk });

        // ref inline: [ref: > other.col] (también soporta <> para muchos-a-muchos)
        const inlineRef = fSettings.match(/ref:\s*(<>|>|<|-)\s*([a-zA-Z0-9_."]+)\.([a-zA-Z0-9_."]+)/i);
        if (inlineRef) {
          const dir = inlineRef[1];
          const otherTable = inlineRef[2].replace(/"/g, '');
          const otherField = inlineRef[3].replace(/"/g, '');
          const pair = cardinalityPair(dir);
          if (dir === '<') {
            refs.push({ from: { table: otherTable, field: otherField }, to: { table: rawName, field: fName }, cardinality: { source: pair.right, target: pair.left }, line: null });
          } else {
            refs.push({ from: { table: rawName, field: fName }, to: { table: otherTable, field: otherField }, cardinality: { source: pair.left, target: pair.right }, line: null });
          }
        }
      });

      tables.push({ name: rawName, color, fields });
    }

    // --- Enums: se representan como "pseudo-tablas" sin tipos, para
    //     reutilizar todo el pipeline de render/layout/colores existente ---
    const enumRe = /Enum\s+([a-zA-Z0-9_." ]+?)\s*(?:\[([^\]]*)\])?\s*\{([\s\S]*?)\}/gi;
    let en;
    while ((en = enumRe.exec(cleaned)) !== null) {
      const eName = en[1].replace(/"/g, '').trim();
      const eSettings = en[2] || '';
      const eBody = en[3] || '';
      let eColor = null;
      const eColorMatch = eSettings.match(/headercolor:\s*["']?(#[0-9a-fA-F]{3,8}|[a-zA-Z]+)["']?/i);
      if (eColorMatch) eColor = eColorMatch[1];

      const values = [];
      eBody.split('\n').forEach(line => {
        const t = line.trim();
        if (!t || /^\/\//.test(t) || /^Note\b/i.test(t)) return;
        const valMatch = t.match(/^([a-zA-Z0-9_."]+)/);
        if (valMatch) values.push({ name: valMatch[1].replace(/"/g, ''), type: '', pk: false });
      });

      tables.push({ name: eName, color: eColor, fields: values, isEnum: true });
    }

    // --- TableGroup: agrupa visualmente un conjunto de tablas existentes ---
    const groupRe = /TableGroup\s+([a-zA-Z0-9_." ]+?)\s*\{([\s\S]*?)\}/gi;
    let gm;
    while ((gm = groupRe.exec(cleaned)) !== null) {
      const gName = gm[1].replace(/"/g, '').trim();
      const gBody = gm[2] || '';
      const memberTables = [];
      gBody.split('\n').forEach(line => {
        const t = line.trim();
        if (!t || /^\/\//.test(t)) return;
        const nameOnly = t.split(/\s+/)[0].replace(/"/g, '');
        if (nameOnly) memberTables.push(nameOnly);
      });
      if (memberTables.length) groups.push({ name: gName, tables: memberTables });
    }

    // --- Refs top-level ---
    // Se escanea el texto ORIGINAL línea por línea (no el "cleaned") para
    // obtener números de línea exactos y poder marcar errores en el editor.
    // Nota: el nombre opcional de la relación (p. ej. "Ref nombre_fk: ...")
    // debe quedar delimitado por los dos puntos obligatorios ':' para no
    // confundirse con el nombre real de la primera tabla referenciada.
    const refLineRe = /^\s*Ref\s*(?:[a-zA-Z0-9_]+)?\s*:\s*([a-zA-Z0-9_]+)\.([a-zA-Z0-9_]+)\s*(<>|>|<|-)\s*([a-zA-Z0-9_]+)\.([a-zA-Z0-9_]+)/i;
    text.split('\n').forEach((lineText, idx) => {
      const rm = lineText.match(refLineRe);
      if (!rm) return;
      const t1 = rm[1], f1 = rm[2], dir = rm[3], t2 = rm[4], f2 = rm[5];
      const pair = cardinalityPair(dir);
      if (dir === '<') {
        refs.push({ from: { table: t2, field: f2 }, to: { table: t1, field: f1 }, cardinality: { source: pair.right, target: pair.left }, line: idx });
      } else {
        refs.push({ from: { table: t1, field: f1 }, to: { table: t2, field: f2 }, cardinality: { source: pair.left, target: pair.right }, line: idx });
      }
    });

    return { tables, refs, groups };
  }

  /* =========================================================================
     4b. PARSER UML (diagrama de clases)
     Sintaxis: class Nombre [headercolor: #hex] { +attr: tipo  +metodo() }
     Relaciones: A "1" --> "N" B : etiqueta   |   A <|-- B (herencia, B hereda de A)
     ========================================================================= */
  function parseUML(text) {
    const tables = [];
    const refs = [];
    const groups = [];
    if (!text || !text.trim()) return { tables, refs, groups };

    const classRe = /class\s+([a-zA-Z0-9_."]+)\s*(?:\[([^\]]*)\])?\s*\{([\s\S]*?)\}/gi;
    let m;
    while ((m = classRe.exec(text)) !== null) {
      const rawName = m[1].replace(/"/g, '');
      const settings = m[2] || '';
      const body = m[3] || '';

      let color = null;
      const colorMatch = settings.match(/headercolor:\s*["']?(#[0-9a-fA-F]{3,8}|[a-zA-Z]+)["']?/i);
      if (colorMatch) color = colorMatch[1];

      const fields = [];
      body.split('\n').forEach(line => {
        const trimmed = line.trim();
        if (!trimmed || /^\/\//.test(trimmed)) return;

        const methodMatch = trimmed.match(/^([+\-#~]?)\s*([a-zA-Z0-9_]+)\s*\(([^)]*)\)\s*(?::\s*([a-zA-Z0-9_<>]+))?$/);
        if (methodMatch) {
          fields.push({ name: methodMatch[2] + '()', type: methodMatch[4] || '', pk: false, visibility: methodMatch[1] || '+' });
          return;
        }
        const attrMatch = trimmed.match(/^([+\-#~]?)\s*([a-zA-Z0-9_]+)\s*:\s*([a-zA-Z0-9_<>,.\[\] ]+)$/);
        if (attrMatch) {
          fields.push({ name: attrMatch[2], type: attrMatch[3].trim(), pk: false, visibility: attrMatch[1] || '+' });
        }
      });

      tables.push({ name: rawName, color, fields, isEnum: false, kind: 'class' });
    }

    text.split('\n').forEach((lineText, idx) => {
      const trimmed = lineText.trim();
      if (!trimmed || /^\/\//.test(trimmed) || /^class\b/i.test(trimmed)) return;

      // herencia: Padre <|-- Hijo  (el hijo hereda del padre)
      const inheritMatch = trimmed.match(/^([a-zA-Z0-9_]+)\s*<\|--\s*([a-zA-Z0-9_]+)/);
      if (inheritMatch) {
        refs.push({
          from: { table: inheritMatch[2], field: '' }, to: { table: inheritMatch[1], field: '' },
          cardinality: { source: '', target: '' }, line: idx, kind: 'inherit', label: ''
        });
        return;
      }

      // asociación: A "1" --> "N" B : etiqueta  (multiplicidades y etiqueta opcionales)
      const assocMatch = trimmed.match(/^([a-zA-Z0-9_]+)\s*(?:"([^"]*)")?\s*-->\s*(?:"([^"]*)")?\s*([a-zA-Z0-9_]+)\s*(?::\s*(.+))?$/);
      if (assocMatch) {
        refs.push({
          from: { table: assocMatch[1], field: '' }, to: { table: assocMatch[4], field: '' },
          cardinality: { source: assocMatch[2] || '', target: assocMatch[3] || '' },
          line: idx, kind: 'assoc', label: (assocMatch[5] || '').trim()
        });
      }
    });

    return { tables, refs, groups };
  }

  /* =========================================================================
     4c. PARSER DFD (Diagrama de Flujo de Datos)
     Nodos: Process|Entity|Store <id> "Etiqueta"
     Flujos: <id> -> <id> : "descripción"
     ========================================================================= */
  function parseDFD(text) {
    const tables = [];
    const refs = [];
    const groups = [];
    if (!text || !text.trim()) return { tables, refs, groups };

    const nodeRe = /^(Process|Entity|Store)\s+([a-zA-Z0-9_]+)\s+"([^"]*)"/i;
    const flowRe = /^([a-zA-Z0-9_]+)\s*->\s*([a-zA-Z0-9_]+)\s*(?::\s*"([^"]*)")?/;
    const idToName = {};

    const lines = text.split('\n');
    lines.forEach(lineText => {
      const trimmed = lineText.trim();
      const m = trimmed.match(nodeRe);
      if (!m) return;
      const kind = m[1].toLowerCase(); // process | entity | store
      const id = m[2], label = m[3];
      idToName[id] = label;
      tables.push({ name: label, color: null, fields: [], isEnum: false, kind: kind });
    });

    lines.forEach((lineText, idx) => {
      const trimmed = lineText.trim();
      const m = trimmed.match(flowRe);
      if (!m) return;
      const fromName = idToName[m[1]], toName = idToName[m[2]];
      if (!fromName || !toName) return; // referencia a un id de nodo inexistente
      refs.push({
        from: { table: fromName, field: '' }, to: { table: toName, field: '' },
        cardinality: { source: '', target: '' }, line: idx, kind: 'flow', label: m[3] || ''
      });
    });

    return { tables, refs, groups };
  }

  function getActiveParser() {
    if (state.activeModelType === 'uml') return parseUML;
    if (state.activeModelType === 'dfd') return parseDFD;
    return parseDBML;
  }

  /* =========================================================================
     5. JOINTJS: INICIALIZACIÓN
     ========================================================================= */
  const graph = new joint.dia.Graph({}, { cellNamespace: joint.shapes });
  const paper = new joint.dia.Paper({
    el: elPaperHost,
    model: graph,
    width: '100%',
    height: '100%',
    gridSize: 10,
    drawGrid: false,
    background: { color: 'transparent' },
    interactive: function (cellView) { return cellView.model.get('type') !== 'app.Group'; },
    async: true,
    defaultRouter: { name: 'manhattan', args: { padding: 12, step: 12 } },
    defaultConnector: { name: 'rounded', args: { radius: 8 } },
    cellViewNamespace: joint.shapes,
    elementView: joint.dia.ElementView,
    linkView: joint.dia.LinkView
  });
  state.graph = graph;
  state.paper = paper;

  const ROW_H = 24;
  const HEADER_H = 32;
  const MIN_W = 220;

  function measureWidth(table) {
    let maxLen = table.name.length + 4;
    table.fields.forEach(f => { maxLen = Math.max(maxLen, (f.name.length + f.type.length + 6)); });
    return Math.max(MIN_W, Math.min(360, maxLen * 8));
  }

  function colorFor(table, index, theme) {
    if (table.color) return normalizeColor(table.color);
    if (table.isEnum) return '#a855f7';
    if (table.kind === 'entity') return '#f59e0b';
    if (table.kind === 'process') return '#22c55e';
    if (table.kind === 'store') return '#6366f1';
    const pal = THEMES[theme].defaultPalette;
    return pal[index % pal.length];
  }

  function normalizeColor(c) {
    if (!c) return '#6366f1';
    if (c[0] === '#') return c;
    // nombres CSS simples
    const named = { red: '#ef4444', blue: '#3b82f6', green: '#22c55e', yellow: '#f59e0b', purple: '#8b5cf6', orange: '#f97316', pink: '#ec4899', cyan: '#06b6d4', teal: '#14b8a6', gray: '#6b7280', grey: '#6b7280' };
    return named[c.toLowerCase()] || '#6366f1';
  }

  function buildTableMarkup(fieldCount) {
    const markup = [
      { tagName: 'rect', selector: 'body' },
      { tagName: 'rect', selector: 'header' },
      { tagName: 'text', selector: 'headerText' }
    ];
    for (let i = 0; i < fieldCount; i++) {
      markup.push({ tagName: 'rect', selector: 'row' + i });
      markup.push({ tagName: 'text', selector: 'pk' + i });
      markup.push({ tagName: 'text', selector: 'fname' + i });
      markup.push({ tagName: 'text', selector: 'ftype' + i });
      markup.push({ tagName: 'line', selector: 'sep' + i });
    }
    return markup;
  }

  function buildTableAttrs(table, width, height, headerColor, theme) {
    const th = THEMES[theme];
    const headerIcon = table.isEnum ? '🔤 ' : (table.kind === 'class' ? '🧩 ' : '');
    const attrs = {
      body: {
        width, height, fill: th.bodyFill, stroke: th.stroke,
        strokeWidth: th.strokeWidth, rx: th.rx, ry: th.rx
      },
      header: {
        width, height: HEADER_H, fill: headerColor, stroke: 'none',
        rx: th.rx, ry: th.rx
      },
      headerText: {
        text: headerIcon + table.name, x: 10, y: 21, fill: th.headerTextColor,
        fontWeight: '700', fontSize: 13, fontFamily: th.fontFamily
      }
    };
    table.fields.forEach((f, i) => {
      const y = HEADER_H + i * ROW_H;
      // en UML, el ícono de la fila es la visibilidad (+/-/#/~); en DBML es la llave primaria
      const icon = f.visibility ? f.visibility : (f.pk ? '🔑' : '');
      attrs['row' + i] = { x: 0, y, width, height: ROW_H, fill: i % 2 === 0 ? th.rowFillA : th.rowFillB };
      attrs['pk' + i] = { text: icon, x: 8, y: y + 16, fontSize: f.visibility ? 12 : 10, fill: th.typeColor, fontWeight: '700' };
      attrs['fname' + i] = { text: f.name, x: 26, y: y + 16, fill: th.textColor, fontSize: 12, fontFamily: th.fontFamily, fontWeight: f.pk ? '700' : '400' };
      attrs['ftype' + i] = { text: f.type, x: width - 10, y: y + 16, fill: th.typeColor, fontSize: 10.5, fontFamily: th.fontFamily, textAnchor: 'end' };
      attrs['sep' + i] = { x1: 0, y1: y + ROW_H, x2: width, y2: y + ROW_H, stroke: th.sepColor, strokeWidth: 0.75 };
    });
    return attrs;
  }

  /* --- Nodos DFD: cajas simples de una sola línea, sin filas --- */
  const DFD_NODE_H = 56;

  function measureDFDWidth(table) {
    return Math.max(130, table.name.length * 9 + 44);
  }

  function buildDFDNodeMarkup(kind) {
    if (kind === 'store') {
      return [
        { tagName: 'rect', selector: 'fillbg' },
        { tagName: 'path', selector: 'storelines' },
        { tagName: 'text', selector: 'label' }
      ];
    }
    return [
      { tagName: 'rect', selector: 'body' },
      { tagName: 'text', selector: 'label' }
    ];
  }

  function buildDFDNodeAttrs(table, width, height, color, theme) {
    const th = THEMES[theme];
    if (table.kind === 'store') {
      return {
        fillbg: { width, height, fill: th.bodyFill, stroke: 'none' },
        storelines: { d: 'M 0 0 L ' + width + ' 0 M 0 ' + height + ' L ' + width + ' ' + height, stroke: color, 'stroke-width': 2, fill: 'none' },
        label: { text: table.name, x: width / 2, y: height / 2 + 4, fill: th.textColor, fontSize: 12, fontFamily: th.fontFamily, textAnchor: 'middle', fontWeight: '600' }
      };
    }
    const rx = table.kind === 'process' ? height / 2 : 4;
    return {
      body: { width, height, fill: th.bodyFill, stroke: color, strokeWidth: 2, rx, ry: rx },
      label: { text: table.name, x: width / 2, y: height / 2 + 4, fill: th.textColor, fontSize: 12, fontFamily: th.fontFamily, textAnchor: 'middle', fontWeight: '600' }
    };
  }

  /* --- Marcadores y estilos de línea por tipo de modelo --- */
  function simpleArrowMarker(color) {
    return { type: 'path', d: 'M 8 -4 0 0 8 4 Z', fill: color };
  }
  function hollowTriangleMarker(color) {
    return { type: 'path', d: 'M 14 -6 0 0 14 6 Z', fill: '#ffffff', stroke: color, 'stroke-width': 1.5 };
  }

  function computeRefProblems(parsed) {
    const tableMap = {};
    parsed.tables.forEach(t => { tableMap[t.name] = t; });
    const problems = [];
    parsed.refs.forEach(ref => {
      if (ref.line == null) return; // solo se pueden marcar refs "Ref:" de nivel superior (con línea conocida)
      const fromTable = tableMap[ref.from.table];
      const toTable = tableMap[ref.to.table];
      if (!fromTable) { problems.push({ line: ref.line, message: 'La tabla "' + ref.from.table + '" no existe.' }); return; }
      if (!toTable) { problems.push({ line: ref.line, message: 'La tabla "' + ref.to.table + '" no existe.' }); return; }
      const fromHasField = fromTable.fields.some(f => f.name === ref.from.field);
      const toHasField = toTable.fields.some(f => f.name === ref.to.field);
      if (!fromHasField) { problems.push({ line: ref.line, message: 'El campo "' + ref.from.field + '" no existe en "' + ref.from.table + '".' }); return; }
      if (!toHasField) { problems.push({ line: ref.line, message: 'El campo "' + ref.to.field + '" no existe en "' + ref.to.table + '".' }); return; }
    });
    return problems;
  }

  // Ubica en qué línea(s) del texto ORIGINAL se declara cada "Table"/"Enum",
  // escaneando línea por línea (igual que con "Ref:") para tener números de
  // línea exactos, sin depender del texto "cleaned" que usa el resto del parser.
  function findDeclarationLines(rawText) {
    const declLines = {};
    const re = /^\s*(Table|Enum)\s+"?([a-zA-Z0-9_]+)"?/i;
    rawText.split('\n').forEach((line, idx) => {
      const m = line.match(re);
      if (!m) return;
      const name = m[2];
      (declLines[name] = declLines[name] || []).push(idx);
    });
    return declLines;
  }

  // Validaciones estructurales adicionales: nombres de tabla/enum repetidos
  // y campos repetidos dentro de una misma tabla.
  function computeStructuralProblems(parsed, rawText) {
    const problems = [];
    const declLines = findDeclarationLines(rawText);

    Object.keys(declLines).forEach(name => {
      const lines = declLines[name];
      if (lines.length > 1) {
        lines.forEach(line => {
          problems.push({ line, message: 'El nombre "' + name + '" está repetido (aparece ' + lines.length + ' veces).' });
        });
      }
    });

    parsed.tables.forEach(t => {
      const counts = {};
      t.fields.forEach(f => { counts[f.name] = (counts[f.name] || 0) + 1; });
      const dupNames = Object.keys(counts).filter(n => counts[n] > 1);
      if (!dupNames.length) return;
      const lines = declLines[t.name] || [];
      const line = lines.length ? lines[0] : null;
      if (line == null) return;
      dupNames.forEach(fname => {
        problems.push({ line, message: 'El campo "' + fname + '" está repetido dentro de "' + t.name + '" (' + counts[fname] + ' veces).' });
      });
    });

    return problems;
  }

  // Notación crow's-foot real: "N" se dibuja como una pata de gallo (3 líneas
  // divergentes) tocando la tabla; "1" como una barra perpendicular ("exactamente
  // uno"). El origen (0,0) del path coincide con el punto de contacto con la
  // tabla; +x se extiende hacia atrás, a lo largo de la línea.
  function crowsFootMarker(card, color) {
    if (card === 'N') {
      return { type: 'path', d: 'M 0 0 12 -7 M 0 0 12 0 M 0 0 12 7', fill: 'none', stroke: color, 'stroke-width': 1.5 };
    }
    return { type: 'path', d: 'M 9 -7 9 7', fill: 'none', stroke: color, 'stroke-width': 1.5 };
  }

  function renderGraph(dbmlText, opts) {
    opts = opts || {};
    const modelType = state.activeModelType;
    const parsed = getActiveParser()(dbmlText);
    state.parsed = parsed;

    if (modelType === 'dbml') {
      markDbmlErrors(computeRefProblems(parsed).concat(computeStructuralProblems(parsed, dbmlText)));
    } else {
      clearDbmlMarkers(); // las validaciones de Refs/duplicados solo aplican al modelo DBML por ahora
    }

    elEmptyHint.style.display = parsed.tables.length ? 'none' : 'flex';

    // Congelamos el paper mientras reconstruimos el grafo para evitar que
    // JointJS intente ordenar/renderizar vistas a medio crear (async paper).
    paper.freeze();

    if (!parsed.tables.length) {
      graph.resetCells([]);
      paper.unfreeze();
      state.selected.clear();
      updateSelectionUI();
      elColorSwatches.innerHTML = '';
      return;
    }

    const theme = state.theme;
    const elementsByName = {};
    const newElements = [];
    const newLinks = [];

    // Tablas ocultas por pertenecer a un TableGroup colapsado (solo DBML por
    // ahora): no se crean como elementos individuales; en su lugar, se crea
    // UN chip por grupo colapsado y se registra en elementsByName bajo el
    // nombre de CADA tabla miembro, para que las relaciones que las tocan se
    // redirijan hacia el chip (en vez de perderse) — así el grupo colapsado
    // conserva sus líneas de relación hacia el resto del diagrama.
    const hiddenByCollapse = {}; // nombre de tabla -> nombre de grupo
    (parsed.groups || []).forEach(g => {
      if (state.collapsedGroups.has(g.name)) g.tables.forEach(t => { hiddenByCollapse[t] = g.name; });
    });
    const collapsedGroupNames = new Set(Object.values(hiddenByCollapse));
    collapsedGroupNames.forEach(groupName => {
      const g = (parsed.groups || []).find(x => x.name === groupName);
      if (!g) return;
      const chip = buildCollapsedChipElement(g, theme);
      newElements.push(chip);
      g.tables.forEach(t => { elementsByName[t] = chip; });
    });

    const isDFDNode = table => table.kind === 'process' || table.kind === 'entity' || table.kind === 'store';

    parsed.tables.forEach((table, idx) => {
      if (hiddenByCollapse[table.name]) return; // ya cubierta por el chip de su grupo
      const headerColor = colorFor(table, idx, theme);
      const saved = state.positions[table.name];
      const pos = saved || { x: 80 + (idx % 4) * 280, y: 80 + Math.floor(idx / 4) * 220 };

      let width, height, markup, attrsObj;
      if (isDFDNode(table)) {
        width = measureDFDWidth(table);
        height = DFD_NODE_H;
        markup = buildDFDNodeMarkup(table.kind);
        attrsObj = buildDFDNodeAttrs(table, width, height, headerColor, theme);
      } else {
        width = measureWidth(table);
        height = HEADER_H + table.fields.length * ROW_H;
        markup = buildTableMarkup(table.fields.length);
        attrsObj = buildTableAttrs(table, width, height, headerColor, theme);
      }

      const el = new joint.dia.Element({
        id: 'tbl_' + table.name,
        type: 'app.Table',
        position: pos,
        size: { width, height },
        attrs: attrsObj,
        z: 2
      });
      // IMPORTANTE: el markup con número variable de filas debe asignarse
      // como propiedad directa de la instancia (no vía atributos de Backbone
      // en el constructor), porque CellView lee `model.markup` directamente.
      el.markup = markup;
      if (THEMES[theme].filter) {
        el.attr(isDFDNode(table) ? 'body/filter' : 'body/filter', THEMES[theme].filter);
      }
      el.set('tableName', table.name, { silent: true });
      elementsByName[table.name] = el;
      newElements.push(el);
    });

    parsed.refs.forEach(ref => {
      const src = elementsByName[ref.from.table];
      const tgt = elementsByName[ref.to.table];
      if (!src || !tgt) return;
      if (src.id === tgt.id) return; // relación interna al mismo grupo colapsado: no se dibuja como bucle
      const linkColor = THEMES[theme].linkColor;
      const link = new joint.dia.Link({
        id: 'ref_' + ref.from.table + '_' + ref.from.field + '_' + ref.to.table + '_' + ref.to.field + '_' + Math.random().toString(36).slice(2, 7),
        type: 'app.Ref',
        source: { id: src.id },
        target: { id: tgt.id },
        router: { name: 'manhattan', args: { padding: 12, step: 12 } },
        connector: { name: 'rounded', args: { radius: 8 } },
        attrs: { line: { stroke: linkColor, strokeWidth: 2.25, filter: THEMES[theme].linkGlow } },
        z: 1
      });

      if (modelType === 'dbml') {
        const card = ref.cardinality || { source: '1', target: '1' };
        link.attr('line/sourceMarker', crowsFootMarker(card.source, linkColor));
        link.attr('line/targetMarker', crowsFootMarker(card.target, linkColor));
        link.appendLabel({
          attrs: {
            text: { text: ref.from.field + ' → ' + ref.to.field, fill: linkColor, fontSize: 9, fontFamily: THEMES[theme].fontFamily },
            rect: { fill: THEMES[theme].bodyFill, stroke: 'none' }
          },
          position: { distance: 0.5 }
        });
      } else if (modelType === 'uml') {
        if (ref.kind === 'inherit') {
          link.attr('line/targetMarker', hollowTriangleMarker(linkColor));
        } else {
          link.attr('line/targetMarker', simpleArrowMarker(linkColor));
          const card = ref.cardinality || { source: '', target: '' };
          if (card.source) {
            link.appendLabel({
              attrs: {
                text: { text: card.source, fill: '#fff', fontSize: 9, fontWeight: '700', fontFamily: THEMES[theme].fontFamily },
                rect: { fill: linkColor, stroke: 'none' }
              },
              position: { distance: 0.12 }
            });
          }
          if (card.target) {
            link.appendLabel({
              attrs: {
                text: { text: card.target, fill: '#fff', fontSize: 9, fontWeight: '700', fontFamily: THEMES[theme].fontFamily },
                rect: { fill: linkColor, stroke: 'none' }
              },
              position: { distance: 0.88 }
            });
          }
        }
        if (ref.label) {
          link.appendLabel({
            attrs: {
              text: { text: ref.label, fill: linkColor, fontSize: 9, fontFamily: THEMES[theme].fontFamily },
              rect: { fill: THEMES[theme].bodyFill, stroke: 'none' }
            },
            position: { distance: 0.5 }
          });
        }
      } else if (modelType === 'dfd') {
        link.attr('line/targetMarker', simpleArrowMarker(linkColor));
        if (ref.label) {
          link.appendLabel({
            attrs: {
              text: { text: ref.label, fill: linkColor, fontSize: 9, fontFamily: THEMES[theme].fontFamily },
              rect: { fill: THEMES[theme].bodyFill, stroke: 'none' }
            },
            position: { distance: 0.5 }
          });
        }
      }

      newLinks.push(link);
    });

    // Reconstrucción atómica: evita eventos "add" intermedios que disparan
    // ordenamientos de vistas inexistentes en un paper async.
    graph.resetCells(newElements.concat(newLinks));

    paper.unfreeze();
    recomputeGroupFrames();
    updateMinimap();

    // Reaplica la selección vigente (si las tablas siguen existiendo) y
    // refresca los swatches de color disponibles en el toolbar.
    const stillValid = new Set();
    state.selected.forEach(id => { if (graph.getCell(id)) stillValid.add(id); });
    state.selected = stillValid;
    state.selected.forEach(id => highlightElement(id));
    updateSelectionUI();
    updateColorSwatches();

    if (!opts.keepPositions && !Object.keys(state.positions).length) {
      applyLayout(state.layoutMode, { silent: true });
    }
  }

  /* =========================================================================
     6. LAYOUTS
     ========================================================================= */
  function getElements() { return graph.getElements().filter(el => el.get('type') !== 'app.Group'); }

  function saveAllPositions() {
    const positions = {};
    getElements().forEach(el => {
      const name = el.get('tableName');
      if (name) positions[name] = el.position();
    });
    state.positions = positions;
    localStorage.setItem(LS_KEYS.positions + '.' + state.activeModelType, JSON.stringify(positions));
  }

  function animateTo(el, x, y) {
    el.position(x, y);
  }

  /* --- Marcos de TableGroup: recuadro punteado detrás de las tablas del grupo --- */
  function groupElementId(name) { return 'grp_' + name; }

  function computeGroupBBox(tableNames) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity, found = false;
    tableNames.forEach(name => {
      const el = graph.getCell('tbl_' + name);
      if (!el) return;
      found = true;
      const pos = el.position(), size = el.size();
      minX = Math.min(minX, pos.x); minY = Math.min(minY, pos.y);
      maxX = Math.max(maxX, pos.x + size.width); maxY = Math.max(maxY, pos.y + size.height);
    });
    if (!found) return null;
    return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
  }

  function recomputeGroupFrames() {
    const groups = (state.parsed && state.parsed.groups) || [];
    const pad = 26, labelSpace = 24;
    groups.forEach(g => {
      if (state.collapsedGroups.has(g.name)) return; // se dibuja como chip aparte
      const bbox = computeGroupBBox(g.tables);
      if (!bbox) return;
      const id = groupElementId(g.name);
      const x = bbox.x - pad, y = bbox.y - pad - labelSpace;
      const w = bbox.width + pad * 2, h = bbox.height + pad * 2 + labelSpace;
      let el = graph.getCell(id);
      if (!el) {
        el = new joint.dia.Element({ id, type: 'app.Group', position: { x, y }, size: { width: w, height: h }, z: 0 });
        el.markup = [
          { tagName: 'rect', selector: 'frame' },
          { tagName: 'rect', selector: 'headerStrip' },
          { tagName: 'text', selector: 'label' }
        ];
        el.attr('frame', {
          width: w, height: h, fill: 'rgba(99,102,241,0.05)',
          stroke: '#6366f1', strokeWidth: 1.5, strokeDasharray: '6,4', rx: 12, ry: 12, cursor: 'move'
        });
        el.attr('headerStrip', {
          width: w, height: labelSpace, x: 0, y: 0, fill: 'transparent', cursor: 'pointer'
        });
        el.attr('label', {
          text: '▾ ' + g.name, x: 12, y: 18, fill: '#a5b4fc', fontSize: 11,
          fontWeight: '700', fontFamily: 'Consolas, Menlo, monospace', cursor: 'pointer'
        });
        el.set('groupName', g.name, { silent: true });
        el.set('collapsed', false, { silent: true });
        graph.addCell(el);
      } else {
        el.set({ position: { x, y }, size: { width: w, height: h } });
        el.attr('frame/width', w);
        el.attr('frame/height', h);
        el.attr('headerStrip/width', w);
      }
    });
  }

  // Calcula el "ancla natural" de un grupo colapsado: el promedio de las
  // últimas posiciones conocidas de sus tablas miembro (antes de colapsar).
  function computeChipAnchor(g) {
    let sumX = 0, sumY = 0, count = 0;
    g.tables.forEach(t => {
      const p = state.positions[t];
      if (p) { sumX += p.x; sumY += p.y; count++; }
    });
    return count ? { x: sumX / count, y: sumY / count } : { x: 80, y: 80 };
  }

  // Construye (sin agregarlo todavía al grafo) el elemento "chip" compacto
  // que representa un TableGroup colapsado. Si el usuario ya arrastró el
  // chip manualmente, se respeta esa posición en vez de recalcularla.
  function buildCollapsedChipElement(g, theme) {
    const w = 220, h = 56;
    const pos = state.collapsedGroupPositions[g.name] || computeChipAnchor(g);
    const el = new joint.dia.Element({ id: groupElementId(g.name), type: 'app.Group', position: pos, size: { width: w, height: h }, z: 0 });
    el.markup = [
      { tagName: 'rect', selector: 'frame' },
      { tagName: 'text', selector: 'label' },
      { tagName: 'text', selector: 'hint' }
    ];
    el.attr('frame', {
      width: w, height: h, fill: '#1e293b', stroke: '#6366f1',
      strokeWidth: 1.5, strokeDasharray: '6,4', rx: 12, ry: 12, cursor: 'move'
    });
    el.attr('label', {
      text: '▸ ' + g.name, x: 14, y: 24, fill: '#a5b4fc', fontSize: 12,
      fontWeight: '700', fontFamily: 'Consolas, Menlo, monospace', cursor: 'pointer'
    });
    el.attr('hint', {
      text: g.tables.length + ' tabla(s) ocultas — clic para expandir, arrastrar para mover', x: 14, y: 40,
      fill: '#94a3b8', fontSize: 9.5, fontFamily: 'Consolas, Menlo, monospace', cursor: 'pointer'
    });
    el.set('groupName', g.name, { silent: true });
    el.set('collapsed', true, { silent: true });
    return el;
  }

  function toggleGroupCollapse(name) {
    if (state.collapsedGroups.has(name)) {
      // Expandir: si el chip fue arrastrado manualmente, desplazamos las
      // tablas miembro por el mismo delta, para que el grupo "se despliegue"
      // en torno a donde lo dejaste, no donde estaba antes de colapsar.
      const g = (state.parsed.groups || []).find(x => x.name === name);
      const manualPos = state.collapsedGroupPositions[name];
      if (g && manualPos) {
        const anchor = computeChipAnchor(g);
        const dx = manualPos.x - anchor.x, dy = manualPos.y - anchor.y;
        if (dx || dy) {
          g.tables.forEach(t => {
            const p = state.positions[t];
            if (p) state.positions[t] = { x: p.x + dx, y: p.y + dy };
          });
        }
      }
      delete state.collapsedGroupPositions[name];
      state.collapsedGroups.delete(name);
    } else {
      state.collapsedGroups.add(name);
    }
    renderGraph(getDbml(), { keepPositions: true });
  }

  // Selecciona todas las tablas miembro de un TableGroup (usado al hacer clic
  // sobre el cuerpo del marco, y también reutilizable desde otros lugares).
  function selectGroupMembers(groupName, additive) {
    const g = (state.parsed.groups || []).find(x => x.name === groupName);
    if (!g) return [];
    const memberIds = g.tables.map(t => 'tbl_' + t).filter(id => graph.getCell(id));
    if (!memberIds.length) return [];
    if (!additive) clearSelection();
    memberIds.forEach(id => selectElement(id));
    return memberIds;
  }

  // Cualquier cambio de posición de una tabla recalcula los marcos de grupo
  // que la contengan (cubre arrastre individual, en grupo y layouts).
  const SNAP_GRID = 20;

  graph.on('change:position', function (cell, newPosition, opt) {
    if (cell.get('type') === 'app.Group') return; // evita recursión al mover el propio marco
    if (state.snapEnabled && !opt.snapped) {
      const sx = Math.round(newPosition.x / SNAP_GRID) * SNAP_GRID;
      const sy = Math.round(newPosition.y / SNAP_GRID) * SNAP_GRID;
      if (sx !== newPosition.x || sy !== newPosition.y) {
        cell.position(sx, sy, { snapped: true });
        return; // el position() de arriba vuelve a disparar este mismo evento ya ajustado
      }
    }
    recomputeGroupFrames();
    updateMinimap();
  });

  elBtnSnap.classList.toggle('active', state.snapEnabled);
  elBtnSnap.addEventListener('click', function () {
    state.snapEnabled = !state.snapEnabled;
    localStorage.setItem(LS_KEYS.snap, state.snapEnabled ? '1' : '0');
    elBtnSnap.classList.toggle('active', state.snapEnabled);
  });

  elBtnMultiSelect.addEventListener('click', function () {
    state.multiSelectMode = !state.multiSelectMode;
    elBtnMultiSelect.classList.toggle('active', state.multiSelectMode);
  });

  function layoutAuto() {
    const els = getElements();
    const cols = Math.max(1, Math.ceil(Math.sqrt(els.length)));
    const gapX = 280, gapY = 220;
    els.forEach((el, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      animateTo(el, 60 + col * gapX, 60 + row * gapY);
    });
  }

  function layoutByColor() {
    const groups = {};
    getElements().forEach(el => {
      const c = el.attr('header/fill') || '#000';
      (groups[c] = groups[c] || []).push(el);
    });
    let gx = 60;
    Object.keys(groups).forEach(color => {
      let gy = 60;
      groups[color].forEach(el => {
        animateTo(el, gx, gy);
        gy += el.size().height + 40;
      });
      gx += 300;
    });
  }

  function layoutByName() {
    const groups = {};
    getElements().forEach(el => {
      const name = el.get('tableName') || '';
      const prefix = name.split('_')[0];
      (groups[prefix] = groups[prefix] || []).push(el);
    });
    let gx = 60;
    Object.keys(groups).forEach(prefix => {
      let gy = 60;
      groups[prefix].forEach(el => {
        animateTo(el, gx, gy);
        gy += el.size().height + 40;
      });
      gx += 300;
    });
  }

  // Layout de fuerza dirigida (Fruchterman-Reingold): cada tabla se repele de
  // todas las demás, y cada relación actúa como un resorte que atrae a las
  // tablas conectadas. Se simulan varias iteraciones con "enfriamiento"
  // progresivo hasta estabilizar, y al final se resuelven los solapes
  // residuales empujando separadas las cajas que aún se pisan.
  function layoutByRelation() {
    const els = getElements();
    if (els.length < 2) return;

    const elById = {};
    els.forEach(el => { elById[el.id] = el; });

    const byName = {};
    els.forEach(el => byName[el.get('tableName')] = el);

    const edges = [];
    state.parsed.refs.forEach(ref => {
      const a = byName[ref.from.table], b = byName[ref.to.table];
      if (a && b && a.id !== b.id) edges.push([a.id, b.id]);
    });

    // estado físico: se parte de las posiciones actuales (mejor punto de
    // partida que posiciones aleatorias, converge más rápido y de forma
    // más predecible entre corridas sucesivas)
    const nodes = {};
    els.forEach(el => {
      const p = el.position(), s = el.size();
      nodes[el.id] = { x: p.x + s.width / 2, y: p.y + s.height / 2, w: s.width, h: s.height, dx: 0, dy: 0 };
    });
    const ids = Object.keys(nodes);
    const n = ids.length;

    const area = n * 62000; // el área objetivo escala con la cantidad de tablas
    const k = Math.sqrt(area / n); // distancia "ideal" de equilibrio entre nodos
    const iterations = 300;
    let temperature = Math.sqrt(area) / 8;

    for (let iter = 0; iter < iterations; iter++) {
      // fuerza de repulsión entre cada par de tablas (como cargas iguales)
      for (let i = 0; i < n; i++) {
        const a = nodes[ids[i]];
        a.dx = 0; a.dy = 0;
        for (let j = 0; j < n; j++) {
          if (i === j) continue;
          const b = nodes[ids[j]];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
          const force = (k * k) / dist;
          a.dx += (dx / dist) * force;
          a.dy += (dy / dist) * force;
        }
      }
      // fuerza de atracción tipo resorte a lo largo de cada relación
      edges.forEach(([idA, idB]) => {
        const a = nodes[idA], b = nodes[idB];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const force = (dist * dist) / k;
        const fx = (dx / dist) * force, fy = (dy / dist) * force;
        a.dx -= fx; a.dy -= fy;
        b.dx += fx; b.dy += fy;
      });
      // aplica el desplazamiento, acotado por la "temperatura" actual
      for (let i = 0; i < n; i++) {
        const a = nodes[ids[i]];
        const disp = Math.sqrt(a.dx * a.dx + a.dy * a.dy) || 0.01;
        const limited = Math.min(disp, temperature);
        a.x += (a.dx / disp) * limited;
        a.y += (a.dy / disp) * limited;
      }
      temperature *= 0.97; // enfriamiento geométrico: cada vez se mueve menos
    }

    // resolución de solapes: empuja separadas las cajas que aún se pisan
    // (Fruchterman-Reingold trata los nodos como puntos, no como rectángulos)
    for (let pass = 0; pass < 6; pass++) {
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const a = nodes[ids[i]], b = nodes[ids[j]];
          const pad = 30;
          const halfW = (a.w + b.w) / 2 + pad, halfH = (a.h + b.h) / 2 + pad;
          const dx = a.x - b.x, dy = a.y - b.y;
          const overlapX = halfW - Math.abs(dx), overlapY = halfH - Math.abs(dy);
          if (overlapX > 0 && overlapY > 0) {
            if (overlapX < overlapY) {
              const push = (overlapX / 2) * (dx >= 0 ? 1 : -1);
              a.x += push; b.x -= push;
            } else {
              const push = (overlapY / 2) * (dy >= 0 ? 1 : -1);
              a.y += push; b.y -= push;
            }
          }
        }
      }
    }

    // normaliza a coordenadas positivas y aplica las posiciones finales
    let minX = Infinity, minY = Infinity;
    ids.forEach(id => {
      const node = nodes[id];
      minX = Math.min(minX, node.x - node.w / 2);
      minY = Math.min(minY, node.y - node.h / 2);
    });
    const offsetX = 60 - minX, offsetY = 60 - minY;
    ids.forEach(id => {
      const node = nodes[id];
      animateTo(elById[id], node.x - node.w / 2 + offsetX, node.y - node.h / 2 + offsetY);
    });
  }

  function layoutByCentrality() {
    const els = getElements();
    const degree = {};
    els.forEach(el => degree[el.get('tableName')] = 0);
    state.parsed.refs.forEach(ref => {
      if (degree[ref.from.table] !== undefined) degree[ref.from.table]++;
      if (degree[ref.to.table] !== undefined) degree[ref.to.table]++;
    });
    const sorted = els.slice().sort((a, b) => degree[b.get('tableName')] - degree[a.get('tableName')]);

    const centerX = 60 + (Math.ceil(Math.sqrt(els.length)) * 280) / 2;
    const centerY = 60 + (Math.ceil(Math.sqrt(els.length)) * 220) / 2;

    sorted.forEach((el, i) => {
      if (i === 0) { animateTo(el, centerX, centerY); return; }
      const ring = Math.ceil((i) / 6);
      const angleStep = (2 * Math.PI) / Math.min(6, els.length - 1);
      const angle = ((i - 1) % 6) * angleStep;
      const radius = ring * 260;
      animateTo(el, centerX + radius * Math.cos(angle) - 100, centerY + radius * Math.sin(angle) - 60);
    });
  }

  function layoutBySize() {
    const els = getElements().slice().sort((a, b) => {
      const fa = (a.get('markup') || []).length, fb = (b.get('markup') || []).length;
      return fb - fa;
    });
    const cols = Math.max(1, Math.ceil(Math.sqrt(els.length)));
    const gapX = 300, gapY = 240;
    els.forEach((el, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      animateTo(el, 60 + col * gapX, 60 + row * gapY);
    });
  }

  function applyLayout(mode, opts) {
    opts = opts || {};
    state.layoutMode = mode;
    localStorage.setItem(LS_KEYS.layout, mode);
    layoutButtons.forEach(b => b.classList.toggle('active', b.dataset.layout === mode));

    switch (mode) {
      case 'color': layoutByColor(); break;
      case 'name': layoutByName(); break;
      case 'relation': layoutByRelation(); break;
      case 'centrality': layoutByCentrality(); break;
      case 'size': layoutBySize(); break;
      default: layoutAuto(); break;
    }
    if (!opts.silent) saveAllPositions();
    else saveAllPositions();
  }

  layoutButtons.forEach(btn => {
    btn.addEventListener('click', () => applyLayout(btn.dataset.layout));
  });

  /* =========================================================================
     6b. ALINEAR Y DISTRIBUIR SELECCIÓN
     ========================================================================= */
  function selectedElementsList() {
    return Array.from(state.selected).map(id => graph.getCell(id)).filter(Boolean);
  }

  function selectionBBox(els) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    els.forEach(el => {
      const p = el.position(), s = el.size();
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x + s.width); maxY = Math.max(maxY, p.y + s.height);
    });
    return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
  }

  // Mueve la selección con precisión exacta (bypassea el snap-to-grid con
  // {snapped:true} para que el nudge de 1px no quede anulado por el imán).
  function nudgeSelection(dx, dy) {
    const els = selectedElementsList();
    if (!els.length) return;
    els.forEach(el => {
      const p = el.position();
      el.position(p.x + dx, p.y + dy, { snapped: true });
    });
    saveAllPositions();
  }

  function alignSelection(mode) {
    const els = selectedElementsList();
    if (els.length < 2) return;
    const bbox = selectionBBox(els);
    els.forEach(el => {
      const p = el.position(), s = el.size();
      let x = p.x, y = p.y;
      switch (mode) {
        case 'left': x = bbox.x; break;
        case 'right': x = bbox.x + bbox.width - s.width; break;
        case 'centerx': x = bbox.x + (bbox.width - s.width) / 2; break;
        case 'top': y = bbox.y; break;
        case 'bottom': y = bbox.y + bbox.height - s.height; break;
        case 'centery': y = bbox.y + (bbox.height - s.height) / 2; break;
      }
      el.position(x, y);
    });
    saveAllPositions();
  }

  function distributeSelection(axis) {
    const els = selectedElementsList();
    if (els.length < 3) return;
    if (axis === 'h') {
      els.sort((a, b) => a.position().x - b.position().x);
      const first = els[0], last = els[els.length - 1];
      const start = first.position().x + first.size().width / 2;
      const end = last.position().x + last.size().width / 2;
      const step = (end - start) / (els.length - 1);
      els.forEach((el, i) => {
        if (i === 0 || i === els.length - 1) return;
        const centerX = start + step * i;
        el.position(centerX - el.size().width / 2, el.position().y);
      });
    } else {
      els.sort((a, b) => a.position().y - b.position().y);
      const first = els[0], last = els[els.length - 1];
      const start = first.position().y + first.size().height / 2;
      const end = last.position().y + last.size().height / 2;
      const step = (end - start) / (els.length - 1);
      els.forEach((el, i) => {
        if (i === 0 || i === els.length - 1) return;
        const centerY = start + step * i;
        el.position(el.position().x, centerY - el.size().height / 2);
      });
    }
    saveAllPositions();
  }

  document.getElementById('align-left').addEventListener('click', () => alignSelection('left'));
  document.getElementById('align-right').addEventListener('click', () => alignSelection('right'));
  document.getElementById('align-centerx').addEventListener('click', () => alignSelection('centerx'));
  document.getElementById('align-top').addEventListener('click', () => alignSelection('top'));
  document.getElementById('align-bottom').addEventListener('click', () => alignSelection('bottom'));
  document.getElementById('align-centery').addEventListener('click', () => alignSelection('centery'));
  document.getElementById('align-disth').addEventListener('click', () => distributeSelection('h'));
  document.getElementById('align-distv').addEventListener('click', () => distributeSelection('v'));

  function updateAlignButtonsUI() {
    const n = state.selected.size;
    alignButtons.forEach(btn => {
      const needsThree = btn.id === 'align-disth' || btn.id === 'align-distv';
      btn.disabled = needsThree ? n < 3 : n < 2;
    });
    elBtnDuplicate.disabled = n < 1;
    elBtnDeleteSel.disabled = n < 1;
    elBtnZoomSel.disabled = n < 1;
  }

  /* =========================================================================
     7. SELECCIÓN MÚLTIPLE, ARRASTRE DE GRUPO Y PERSISTENCIA DE POSICIONES
     ========================================================================= */
  function highlightElement(id) {
    const el = graph.getCell(id);
    if (!el) return;
    el.attr('body/stroke', '#818cf8');
    el.attr('body/strokeWidth', 3);
  }
  function unhighlightElement(id) {
    const el = graph.getCell(id);
    if (!el) return;
    const th = THEMES[state.theme];
    el.attr('body/stroke', th.stroke);
    el.attr('body/strokeWidth', th.strokeWidth);
  }
  function updateSelectionUI() {
    if (state.selected.size > 0) {
      elBtnClearSel.classList.remove('hidden');
      elSelectionCount.textContent = state.selected.size;
    } else {
      elBtnClearSel.classList.add('hidden');
      elSelectionCount.textContent = '';
    }
    updateAlignButtonsUI();
    updateMinimap();
  }
  function selectElement(id) {
    if (state.selected.has(id)) return;
    state.selected.add(id);
    highlightElement(id);
    updateSelectionUI();
  }
  function deselectElement(id) {
    if (!state.selected.has(id)) return;
    state.selected.delete(id);
    unhighlightElement(id);
    updateSelectionUI();
  }
  function toggleSelectElement(id) {
    if (state.selected.has(id)) deselectElement(id); else selectElement(id);
  }
  function clearSelection() {
    state.selected.forEach(id => unhighlightElement(id));
    state.selected.clear();
    state.activeColorFilter = null;
    Array.from(elColorSwatches.children).forEach(b => b.classList.remove('active'));
    updateSelectionUI();
  }
  elBtnClearSel.addEventListener('click', clearSelection);
  document.addEventListener('keydown', function (evt) {
    if (evt.key === 'Escape') clearSelection();
  });

  /* --- Selección y arrastre (individual o en grupo) de tablas --- */
  paper.on('element:pointerdown', function (elementView, evt) {
    const model = elementView.model;

    if (model.get('type') === 'app.Group') {
      // El título (headerStrip/label/hint) del marco EXPANDIDO es exclusivo
      // para colapsar (se maneja en element:pointerclick); acá solo interesa
      // el cuerpo del marco. En el chip COLAPSADO, en cambio, todo el cuerpo
      // sirve tanto para arrastrar como (si no hubo arrastre) para expandir
      // vía element:pointerclick.
      const isCollapsedChip = !!model.get('collapsed');
      const selector = evt.target && evt.target.getAttribute && evt.target.getAttribute('joint-selector');
      if (!isCollapsedChip && (selector === 'headerStrip' || selector === 'label' || selector === 'hint')) return;

      if (isCollapsedChip) {
        const groupName = model.get('groupName');
        if (!groupName) return;
        const p0 = getPointerXY(evt);
        state.chipDrag = { groupName, startX: p0.x, startY: p0.y, startPos: model.position() };
        return;
      }

      const groupName = model.get('groupName');
      if (!groupName) return;
      const isModifier = evt.shiftKey || evt.ctrlKey || evt.metaKey || state.multiSelectMode;
      const memberIds = selectGroupMembers(groupName, isModifier);
      if (!memberIds.length) return;
      if (isModifier) { state.groupFrameDrag = null; return; } // el modificador solo suma a la selección, no arrastra

      // Arrastre de todo el grupo: como el marco no es "interactive", se
      // registra la posición inicial de cada miembro y el punto de partida
      // del puntero, y el movimiento se seguirá con listeners globales de
      // documento (más robusto que depender de pointermove de JointJS sobre
      // un elemento no-interactivo, y funciona igual con mouse o touch).
      const startPositions = {};
      memberIds.forEach(id => {
        const el = graph.getCell(id);
        if (el) startPositions[id] = el.position();
      });
      const p0 = getPointerXY(evt);
      state.groupFrameDrag = { startX: p0.x, startY: p0.y, startPositions };
      return;
    }

    const id = model.id;
    const isModifier = evt.shiftKey || evt.ctrlKey || evt.metaKey || state.multiSelectMode;

    if (isModifier) {
      toggleSelectElement(id);
      state.dragGroup = null; // clic con modificador solo alterna la selección
      return;
    }

    if (!state.selected.has(id)) {
      clearSelection();
      selectElement(id);
    }

    if (state.selected.size > 1) {
      const startPositions = {};
      state.selected.forEach(selId => {
        const el = graph.getCell(selId);
        if (el) startPositions[selId] = el.position();
      });
      state.dragGroup = { originId: id, originStart: elementView.model.position(), startPositions };
    } else {
      state.dragGroup = null;
    }
  });

  function handleGroupFrameDragMove(evt) {
    if (!state.groupFrameDrag) return;
    const p = getPointerXY(evt);
    const scale = paper.scale().sx || 1;
    const dx = (p.x - state.groupFrameDrag.startX) / scale;
    const dy = (p.y - state.groupFrameDrag.startY) / scale;
    Object.keys(state.groupFrameDrag.startPositions).forEach(id => {
      const el = graph.getCell(id);
      if (!el) return;
      const sp = state.groupFrameDrag.startPositions[id];
      el.position(sp.x + dx, sp.y + dy);
    });
  }
  function handleGroupFrameDragEnd() {
    if (!state.groupFrameDrag) return;
    state.groupFrameDrag = null;
    saveAllPositions();
  }
  document.addEventListener('mousemove', handleGroupFrameDragMove);
  document.addEventListener('touchmove', handleGroupFrameDragMove, { passive: false });
  document.addEventListener('mouseup', handleGroupFrameDragEnd);

  // Arrastre del chip de un TableGroup colapsado (grupo entero como bloque
  // único). La posición final queda guardada para que, al expandir, las
  // tablas miembro reaparezcan desplazadas por el mismo delta.
  function handleChipDragMove(evt) {
    if (!state.chipDrag) return;
    const p = getPointerXY(evt);
    const scale = paper.scale().sx || 1;
    const dx = (p.x - state.chipDrag.startX) / scale;
    const dy = (p.y - state.chipDrag.startY) / scale;
    const el = graph.getCell(groupElementId(state.chipDrag.groupName));
    if (el) el.position(state.chipDrag.startPos.x + dx, state.chipDrag.startPos.y + dy);
  }
  function handleChipDragEnd() {
    if (!state.chipDrag) return;
    const el = graph.getCell(groupElementId(state.chipDrag.groupName));
    if (el) state.collapsedGroupPositions[state.chipDrag.groupName] = el.position();
    state.chipDrag = null;
  }
  document.addEventListener('mousemove', handleChipDragMove);
  document.addEventListener('touchmove', handleChipDragMove, { passive: false });
  document.addEventListener('mouseup', handleChipDragEnd);
  document.addEventListener('touchend', handleChipDragEnd);
  document.addEventListener('touchend', handleGroupFrameDragEnd);

  paper.on('element:pointermove', function (elementView) {
    const dg = state.dragGroup;
    if (!dg || elementView.model.id !== dg.originId) return;
    const cur = elementView.model.position();
    const dx = cur.x - dg.originStart.x;
    const dy = cur.y - dg.originStart.y;
    Object.keys(dg.startPositions).forEach(id => {
      if (id === dg.originId) return;
      const el = graph.getCell(id);
      if (!el) return;
      const sp = dg.startPositions[id];
      el.position(sp.x + dx, sp.y + dy);
    });
  });

  paper.on('element:pointerup', function () {
    state.dragGroup = null;
    saveAllPositions();
  });

  /* --- Selección por recuadro (rubber-band): mantener Shift + arrastrar el fondo --- */
  let rubberBandEl = null;

  function beginRubberBand(clientX, clientY) {
    const rect = elPaperContainer.getBoundingClientRect();
    state.rubberBand = { x0: clientX - rect.left, y0: clientY - rect.top, rectPx: null };
    rubberBandEl = document.createElement('div');
    rubberBandEl.id = 'rubber-band';
    elPaperContainer.appendChild(rubberBandEl);
    updateRubberBand(clientX, clientY);
  }

  function updateRubberBand(clientX, clientY) {
    if (!rubberBandEl || !state.rubberBand) return;
    const rect = elPaperContainer.getBoundingClientRect();
    const x1 = clientX - rect.left, y1 = clientY - rect.top;
    const x0 = state.rubberBand.x0, y0 = state.rubberBand.y0;
    const left = Math.min(x0, x1), top = Math.min(y0, y1);
    const w = Math.abs(x1 - x0), h = Math.abs(y1 - y0);
    rubberBandEl.style.left = left + 'px';
    rubberBandEl.style.top = top + 'px';
    rubberBandEl.style.width = w + 'px';
    rubberBandEl.style.height = h + 'px';
    state.rubberBand.rectPx = { left, top, w, h };
  }

  function endRubberBand() {
    if (rubberBandEl) { rubberBandEl.remove(); rubberBandEl = null; }
    const rb = state.rubberBand;
    state.rubberBand = null;
    if (!rb || !rb.rectPx || rb.rectPx.w < 4 || rb.rectPx.h < 4) return;

    const tr = paper.translate();
    const sc = paper.scale();
    const toLocal = (px, py) => ({ x: (px - tr.tx) / sc.sx, y: (py - tr.ty) / sc.sy });
    const p0 = toLocal(rb.rectPx.left, rb.rectPx.top);
    const p1 = toLocal(rb.rectPx.left + rb.rectPx.w, rb.rectPx.top + rb.rectPx.h);
    const sel = {
      x: Math.min(p0.x, p1.x), y: Math.min(p0.y, p1.y),
      width: Math.abs(p1.x - p0.x), height: Math.abs(p1.y - p0.y)
    };

    clearSelection();
    getElements().forEach(el => {
      const b = el.getBBox();
      const intersects = sel.x < b.x + b.width && sel.x + sel.width > b.x &&
                          sel.y < b.y + b.height && sel.y + sel.height > b.y;
      if (intersects) selectElement(el.id);
    });
  }

     ========================================================================= */

      (groups[color] = groups[color] || []).push(el.id);
    });
